name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin, freebsd]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd server/frontend
          npm ci
          npm run build

      - name: Build binary
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          VERSION="${{ github.ref_name }}"
          COMMIT="$(git rev-parse HEAD)"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" -o dist/tinyice-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} main.go


      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tinyice-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  test_startup:
    name: Test TinyIce Startup
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine Runner Architecture
        id: arch_detect
        run: |
          RUNNER_ARCH=$(uname -m)
          case "$RUNNER_ARCH" in
            x86_64) GOARCH="amd64" ;;
            aarch64) GOARCH="arm64" ;;
            arm64) GOARCH="arm64" ;;
            *) echo "Unsupported runner architecture: $RUNNER_ARCH"; exit 1 ;;
          esac
          echo "GOARCH=$GOARCH" >> "$GITHUB_OUTPUT"

      - name: Download Linux Artifact for Runner Arch
        uses: actions/download-artifact@v8
        with:
          name: tinyice-linux-${{ steps.arch_detect.outputs.GOARCH }}
          path: artifacts_to_test

      - name: Run TinyIce startup test
        run: |
          GOARCH="${{ steps.arch_detect.outputs.GOARCH }}"
          BINARY_PATH="artifacts_to_test/tinyice-linux-${GOARCH}"
          
          echo "Starting TinyIce in background for 5 seconds to check for startup errors..."
          chmod +x "$BINARY_PATH" # Add execute permissions
          
          # Run TinyIce, preventing set -e from failing the script immediately if timeout returns 124.
          # We want to pass if it exits 0 (graceful stop) or 124 (timeout).
          # We fail if it exits with any other non-zero code.
          if timeout 5s sh -c "$BINARY_PATH -port 8080 -config /tmp/tinyice-test-linux-${GOARCH}.json"; then
            TIMEOUT_EXIT_CODE=0 # timeout succeeded, meaning inner command exited 0
          else
            TIMEOUT_EXIT_CODE=$? # timeout failed (either non-zero from inner command or 124 for timeout)
          fi
          
          if [ $TIMEOUT_EXIT_CODE -eq 0 ]; then
            echo "TinyIce exited gracefully within 5 seconds. Test passed."
            exit 0 # Pass
          elif [ $TIMEOUT_EXIT_CODE -eq 124 ]; then
            echo "TinyIce ran for more than 5 seconds or was killed by timeout. Test passed (successful startup)."
            exit 0 # Pass
          else
            echo "TinyIce exited with an unexpected error code: $TIMEOUT_EXIT_CODE within 5 seconds. This indicates a startup failure."
            exit 1 # Fail
          fi

  package_linux:
    name: Package (${{ matrix.arch }} deb+rpm)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: tinyice-linux-${{ matrix.arch }}
          path: dist

      - name: Install nFPM
        run: |
          NFPM_TOOL_VERSION=2.46.3
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_TOOL_VERSION}/nfpm_${NFPM_TOOL_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build deb + rpm
        env:
          # nFPM expects bare X.Y.Z; strip the leading "v" from the tag.
          NFPM_VERSION: ${{ github.ref_name }}
          NFPM_ARCH: ${{ matrix.arch }}
        run: |
          NFPM_VERSION="${NFPM_VERSION#v}"
          export NFPM_VERSION
          # Stage the per-arch binary at the fixed path nfpm.yaml
          # references; env vars don't expand inside contents.src.
          mkdir -p packaging/_staged
          cp "dist/tinyice-linux-${NFPM_ARCH}" packaging/_staged/tinyice
          chmod +x packaging/_staged/tinyice
          mkdir -p packages
          nfpm package --config packaging/nfpm.yaml --packager deb --target packages/
          nfpm package --config packaging/nfpm.yaml --packager rpm --target packages/
          ls -la packages/

      - name: Smoke-test deb install + uninstall (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          DEB=$(ls packages/*.deb | head -1)
          echo "Installing $DEB"
          sudo dpkg -i "$DEB"
          # Files in place
          test -x /usr/bin/tinyice
          test -f /lib/systemd/system/tinyice.service
          test -d /etc/tinyice
          test -d /var/lib/tinyice
          # System user created by preinstall
          getent passwd tinyice >/dev/null
          # Binary execves and reads its flags (exits 2 on --help, which
          # is fine — we just want to confirm it didn't segfault on a
          # missing shared library).
          /usr/bin/tinyice --help >/dev/null 2>&1 ; rc=$?
          [ $rc -eq 0 ] || [ $rc -eq 2 ] || { echo "tinyice --help crashed: rc=$rc" ; exit 1 ; }
          # Capability set so the unprivileged user can bind to 80/443
          getcap /usr/bin/tinyice | grep -q cap_net_bind_service || \
            echo "warn: setcap unavailable on runner — production install will get the cap"
          # Unit should be MASKED out of the gate — operator must
          # explicitly unmask before enable+start. Verify both that
          # systemctl reports it masked AND that a stray `start`
          # refuses to bring it up.
          if [ -d /run/systemd/system ]; then
            state=$(systemctl is-enabled tinyice 2>&1 || true)
            echo "systemctl is-enabled: $state"
            echo "$state" | grep -q masked || { echo "expected unit to be masked"; exit 1; }
            if sudo systemctl start tinyice 2>/dev/null; then
              echo "BUG: masked unit accepted a start request"
              exit 1
            fi
            echo "mask blocks accidental start — OK"
          fi
          sudo dpkg -r tinyice
          test ! -f /lib/systemd/system/tinyice.service
          echo "deb install/remove cycle OK"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: tinyice-packages-${{ matrix.arch }}
          path: packages/*

  release:
    name: Create Release
    needs: [build, test_startup, package_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate Checksums
        run: |
          cd artifacts
          # Generate checksums for binaries + Linux packages. nFPM
          # writes deb/rpm into tinyice-packages-<arch>/ artifact dirs.
          sha256sum tinyice-*/tinyice-* tinyice-packages-*/*.deb tinyice-packages-*/*.rpm 2>/dev/null \
            | sed -E 's|tinyice-[^/]*/||' > ../checksums.txt
          cd ..

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/**/tinyice*
            artifacts/tinyice-packages-*/*.deb
            artifacts/tinyice-packages-*/*.rpm
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    needs: test_startup
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/tinyice
          # While the project is still in beta, apply :latest to every tag
          # so `docker pull ghcr.io/.../tinyice:latest` always resolves.
          # Also publish a :vX.Y.Z alias alongside the stripped :X.Y.Z so
          # both forms work.
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max