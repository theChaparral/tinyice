<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyIce Studio - {{.Streamer.Name}}</title>
    <script src="/assets/js/lucide.min.js"></script>
    <script src="/assets/js/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --surface: #0f1219; --surface-hover: #161b2c;
            --primary: #38bdf8; --primary-glow: rgba(56, 189, 248, 0.3);
            --secondary: #94a3b8; --text: #f8fafc; --text-dim: #64748b;
            --border: #1f222c; --danger: #ef4444; --success: #10b981;
            --warning: #fbbf24;
            --matrix-bg: #000; --matrix-text: #33ff33;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header */
        header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between; z-index: 100; }
        .studio-logo { display: flex; align-items: center; gap: 0.75rem; font-weight: 800; font-size: 1.1rem; text-decoration: none; color: var(--text); }
        .studio-logo img { height: 24px; }
        .mount-badge { background: var(--primary-glow); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 6px; font-family: monospace; font-size: 0.8rem; font-weight: 700; }
        
        .header-stats { display: flex; gap: 2rem; align-items: center; }
        .h-stat { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-dim); }
        .h-stat strong { color: var(--text); }

        /* Dot Matrix Display */
        .matrix-container {
            background: var(--matrix-bg);
            border: 4px solid #1a1a1a;
            border-radius: 8px;
            padding: 0.75rem;
            margin: 1rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 15px rgba(51, 255, 51, 0.1);
            overflow: hidden;
            position: relative;
            height: 30px;
            display: flex;
            align-items: center;
        }
        .matrix-text {
            font-family: 'Press Start 2P', monospace;
            color: var(--matrix-text);
            font-size: 0.85rem;
            white-space: nowrap;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(51, 255, 51, 0.6);
            display: inline-block;
            position: absolute;
            will-change: transform;
        }
        @keyframes matrix-scroll {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* Layout Grid */
        .studio-main { flex: 1; display: grid; grid-template-columns: 350px 1fr 400px; gap: 0; overflow: hidden; }
        
        .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); height: 100%; overflow: hidden; }
        .panel-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); flex-shrink: 0; }
        .panel-header h2 { margin: 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); font-weight: 800; }
        .panel-content { flex: 1; overflow-y: auto; padding: 0.5rem; }

        /* Library Browser */
        .lib-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .lib-item:hover { background: var(--surface-hover); }
        .lib-item i { width: 16px; height: 16px; color: var(--text-dim); flex-shrink: 0; }
        .lib-actions { margin-left: auto; display: none; gap: 0.3rem; }
        .lib-item:hover .lib-actions { display: flex; }

        /* The Deck */
        .deck-panel { background: radial-gradient(circle at center, #111827 0%, #05070a 100%); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .deck-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        .vinyl-container { position: relative; width: 280px; height: 280px; margin-bottom: 2rem; }
        .vinyl { width: 100%; height: 100%; border-radius: 50%; background: #111; border: 10px solid #000; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .vinyl::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-radial-gradient(circle, #222 0, #222 1px, transparent 2px, transparent 4px); opacity: 0.3; }
        .vinyl-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 100px; background: var(--primary); border-radius: 50%; border: 4px solid #000; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .vinyl-label i { color: #000; width: 32px; height: 32px; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .vinyl-playing .vinyl-label { animation: spin 3s linear infinite; }

        .transport-controls { display: flex; gap: 1.5rem; align-items: center; margin-top: 1rem; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-circle:hover { background: var(--surface-hover); border-color: var(--primary); color: var(--primary); }
        .btn-circle.primary { width: 70px; height: 70px; background: var(--primary); color: #000; border: none; box-shadow: 0 0 30px var(--primary-glow); }
        .btn-circle.primary:hover { transform: scale(1.05); background: #fff; }
        
        .monitor-player { background: var(--surface); padding: 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
        .monitor-player audio { height: 30px; flex: 1; filter: invert(1) hue-rotate(180deg); opacity: 0.8; }

        /* Management */
        .sub-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid var(--border); }
        .sub-panel-header { padding: 0.75rem 1rem; background: rgba(0,0,0,0.3); font-size: 0.65rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .list-container { flex: 1; overflow-y: auto; padding: 0.25rem; }
        
        .p-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.8rem; transition: 0.2s; cursor: grab; background: var(--bg); border-radius: 4px; margin-bottom: 2px; }
        .p-item:hover { background: var(--surface-hover); }
        .p-item.active { background: var(--primary-glow); border-left: 3px solid var(--primary); }
        .p-item .idx { color: var(--text-dim); font-family: monospace; width: 20px; font-size: 0.7rem; }
        .p-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-item .actions { display: none; gap: 0.4rem; }
        .p-item:hover .actions { display: flex; }
        .p-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 2px; }
        .p-btn:hover { color: var(--primary); }
        .p-btn.del:hover { color: var(--danger); }

        /* Action Overlay */
        .action-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(22, 27, 44, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; display: none; flex-direction: column; align-items: center; gap: 1rem; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); min-width: 150px; }
        .spinner { animation: rotate 2s linear infinite; color: var(--primary); display: inline-block; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center;">
            <i data-lucide="loader-2" class="spinner" style="width:48px; height:48px; color:var(--primary);"></i>
            <p style="margin-top:1rem; color:var(--text-dim);">Initializing Studio...</p>
        </div>
    </div>

    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="/admin#tab-streamer" class="studio-logo">
                <i data-lucide="chevron-left" style="width: 20px; color: var(--text-dim);"></i>
                <img src="/assets/logo.png" alt="TinyIce">
                <span>STUDIO <a href="https://github.com/DatanoiseTV/tinyice/{{if .Commit}}commit/{{.Commit}}{{else}}releases/latest{{end}}" target="_blank" style="font-size: 0.6rem; color: var(--text-dim); margin-left: 0.2rem; font-weight: 400; text-decoration: none;">{{.Version}}</a></span>
            </a>
            <div class="mount-badge">{{.Streamer.Mount}}</div>
        </div>

        <div class="header-stats">
            <div class="h-stat"><i data-lucide="users" style="width:14px"></i> Listeners: <strong id="h-listeners">0</strong></div>
            <div class="h-stat"><i data-lucide="activity" style="width:14px"></i> Bitrate: <strong id="h-bitrate">0 kbps</strong></div>
            <div class="h-stat"><i data-lucide="clock" style="width:14px"></i> Uptime: <strong id="h-uptime">0s</strong></div>
            <div class="status-pill" id="h-status-pill"><div class="dot"></div> <span id="h-status-text">IDLE</span></div>
        </div>
    </header>

    <div class="studio-main">
        <div class="panel">
            <div class="panel-header">
                <h2>Library</h2>
                <button class="p-btn" onclick="loadLibrary()" title="Refresh Library"><i data-lucide="refresh-cw" style="width:14px"></i></button>
            </div>
            <div class="panel-content" id="library-tree">
                <!-- Populated via JS -->
            </div>
        </div>

        <div class="panel deck-panel">
            <div class="matrix-container">
                <div class="matrix-text" id="matrix-scroll-text">OFFLINE</div>
            </div>

            <div class="deck-container">
                <div class="vinyl-container" id="vinyl-box">
                    <div class="vinyl">
                        <div class="vinyl-label"><i data-lucide="music"></i></div>
                    </div>
                </div>

                <div style="text-align: center; margin-bottom: 2rem;">
                    <div class="song-artist" id="deck-artist">STUDIO BROADCAST</div>
                    <div style="font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; color: var(--text);" id="deck-title">DECK IDLE</div>
                </div>

                <div style="width: 100%; max-width: 600px;">
                    <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;">
                        <div class="progress-bar" id="deck-progress" style="width: 0%; height: 100%; background: var(--primary); transition: none;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-family: monospace; font-size: 0.75rem; color: var(--text-dim);">
                        <span id="deck-time-cur">00:00</span>
                        <span id="deck-time-total">00:00</span>
                    </div>
                </div>

                <div class="transport-controls">
                    <button class="btn-circle" onclick="transport('restart')" title="Restart Track"><i data-lucide="rotate-ccw"></i></button>
                    <button class="btn-circle primary" id="play-pause-btn" onclick="transport('toggle')">
                        <i data-lucide="play" id="play-icon"></i>
                    </button>
                    <button class="btn-circle" onclick="transport('next')" title="Skip Forward"><i data-lucide="skip-forward"></i></button>
                </div>

                <div style="display: flex; gap: 0.75rem; margin-top: 2rem;">
                    <button class="toggle-btn" id="toggle-shuffle" onclick="transport('shuffle')"><i data-lucide="shuffle"></i> SHUFFLE</button>
                    <button class="toggle-btn" id="toggle-loop" onclick="transport('loop')"><i data-lucide="repeat"></i> LOOP</button>
                    <button class="toggle-btn" id="toggle-meta" onclick="transport('metadata')"><i data-lucide="tag"></i> METADATA</button>
                </div>
            </div>

            <div class="monitor-player">
                <div style="font-size: 0.65rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1px;">MONITOR</div>
                <audio id="monitor-audio" src="{{.Streamer.Mount}}?t=0" controls></audio>
            </div>
        </div>

        <div class="panel playlist-panel" style="border-right: none;">
            <div class="sub-panel" style="max-height: 35%;">
                <div class="sub-panel-header" style="color: var(--primary)">
                    UP NEXT (QUEUE)
                    <button class="btn-sm btn-danger" onclick="transport('clear-queue')">CLEAR ALL</button>
                </div>
                <div class="list-container" id="queue-list"></div>
            </div>

            <div class="sub-panel">
                <div class="sub-panel-header">
                    ACTIVE PLAYLIST
                    <div style="display: flex; gap: 0.4rem;">
                        <button class="btn-sm" onclick="transport('save-playlist')">SAVE .PLS</button>
                        <button class="btn-sm btn-danger" onclick="transport('clear-playlist')">CLEAR ALL</button>
                    </div>
                </div>
                <div class="list-container" id="playlist-list"></div>
            </div>
        </div>
    </div>

    <div id="action-overlay" class="action-overlay">
        <div id="action-icon-container"><i data-lucide="loader-2" class="spinner"></i></div>
        <div id="action-text" style="font-size: 0.8rem; color: var(--text-dim); font-weight: 600;">Updating...</div>
    </div>

    <script>
        const mount = "{{.Streamer.Mount}}";
        const csrfToken = "{{.CSRFToken}}";
        let lastStartTime = 0;
        let lastSong = "";

        window.addEventListener('load', () => {
            document.getElementById('loading-overlay').style.display = 'none';
            loadLibrary();
            lucide.createIcons();
        });

        function transport(action) {
            const fd = new FormData();
            fd.append('csrf', csrfToken);
            fd.append('mount', mount);
            submitForm(`/admin/player/${action === 'toggle' ? 'toggle' : action}`, fd);
        }

        function playlistAction(action, fileOrIdx) {
            const fd = new FormData();
            fd.append('csrf', csrfToken);
            fd.append('mount', mount);
            fd.append('action', action);
            fd.append(action === 'add' ? 'file' : 'index', fileOrIdx);
            submitForm('/admin/player/playlist-action', fd);
        }

        function queueAction(action, pathOrIdx) {
            const fd = new FormData();
            fd.append('csrf', csrfToken);
            fd.append('mount', mount);
            fd.append('action', action);
            fd.append(action === 'add' ? 'path' : 'index', pathOrIdx);
            submitForm('/admin/player/queue', fd);
        }

        function submitForm(url, fd) {
            const overlay = document.getElementById('action-overlay');
            overlay.style.display = 'flex';
            fetch(url, { method: 'POST', body: fd }).then(r => {
                if (r.ok) setTimeout(() => overlay.style.display = 'none', 400);
                else { alert('Error: ' + r.statusText); overlay.style.display = 'none'; }
            });
        }

        function loadLibrary(path = '') {
            const tree = document.getElementById('library-tree');
            tree.innerHTML = '<div style="text-align:center; padding:2rem;"><i data-lucide="loader-2" class="spinner"></i></div>';
            lucide.createIcons();

            fetch(`/admin/player/files?mount=${encodeURIComponent(mount)}&path=${encodeURIComponent(path)}`)
                .then(r => r.json())
                .then(data => {
                    let html = path ? `<div class="lib-item" onclick="loadLibrary('${path.split('/').slice(0,-1).join('/')}')"><i data-lucide="chevron-left" style="color:var(--primary)"></i> <span style="color:var(--primary)">Back to ..</span></div>` : '';
                    data.forEach(e => {
                        const icon = e.is_dir ? 'folder' : (e.is_pls ? 'file-audio' : 'music');
                        html += `
                        <div class="lib-item">
                            <div style="flex:1; display:flex; align-items:center; gap:0.6rem; overflow:hidden;" ${e.is_dir ? `onclick="loadLibrary('${e.path}')"` : ''}>
                                <i data-lucide="${icon}"></i>
                                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${e.title || e.name}</span>
                            </div>
                            <div class="lib-actions">
                                ${!e.is_dir ? `<button class="btn-sm" onclick="queueAction('add', '${e.abs_path}')" title="Queue Next">Q</button>` : ''}
                                <button class="btn-sm" onclick="playlistAction('add', '${e.abs_path}')" title="Add to Playlist">+</button>
                            </div>
                        </div>`;
                    });
                    tree.innerHTML = html;
                    lucide.createIcons();
                });
        }

        const es = new EventSource("/admin/events");
        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const st = data.streamers.find(s => s.mount === mount);
            if (!st) return;

            document.getElementById('h-listeners').textContent = data.total_listeners;
            document.getElementById('h-bitrate').textContent = st.bitrate ? `${st.bitrate} kbps` : 'N/A';
            document.getElementById('h-uptime').textContent = data.server_uptime;

            const vinyl = document.getElementById('vinyl-box');
            const playIcon = document.getElementById('play-icon');
            const matrix = document.getElementById('matrix-scroll-text');

            if (st.state === 1) {
                vinyl.classList.add('vinyl-playing');
                playIcon.setAttribute('data-lucide', 'pause');
                document.getElementById('deck-title').textContent = st.song || 'BROADCASTING';
                if (lastSong !== st.song) {
                    matrix.textContent = st.song || 'LIVE';
                    const duration = Math.max(10, matrix.textContent.length * 0.3);
                    matrix.style.animation = 'none';
                    matrix.offsetHeight; 
                    matrix.style.animation = `matrix-scroll ${duration}s linear infinite`;
                    lastSong = st.song;
                }
                const prog = document.getElementById('deck-progress');
                if (lastStartTime != st.start_time) { lastStartTime = st.start_time; prog.style.width = '0%'; }
                prog.dataset.start = st.start_time;
                prog.dataset.duration = st.duration;
            } else {
                vinyl.classList.remove('vinyl-playing');
                playIcon.setAttribute('data-lucide', 'play');
                document.getElementById('deck-title').textContent = 'DECK IDLE';
                matrix.textContent = 'OFFLINE';
                lastSong = "";
            }
            lucide.createIcons();

            document.getElementById('toggle-shuffle').classList.toggle('active', st.shuffle);
            document.getElementById('toggle-loop').classList.toggle('active', st.loop);

            renderList('queue-list', st.queue, true);
            renderList('playlist-list', st.playlist, false);
        };

        function renderList(id, items, isQueue) {
            const el = document.getElementById(id);
            if (el.dataset.len == (items || []).length && !isQueue) return;
            el.dataset.len = (items || []).length;

            let html = '';
            (items || []).forEach((item, idx) => {
                html += `
                <div class="p-item" data-index="${idx}">
                    <i data-lucide="grip-vertical" style="width:12px; color:var(--border)"></i>
                    <span class="idx">${idx+1}</span>
                    <span class="title" title="${item.Path}">${item.Title}</span>
                    <div class="actions">
                        ${!isQueue ? `<button class="p-btn" onclick="queueAction('add', '${item.Path}')" title="Queue Next"><i data-lucide="list-plus" style="width:14px"></i></button>` : ''}
                        <button class="p-btn del" onclick="${isQueue ? 'queueAction' : 'playlistAction'}('remove', ${idx})"><i data-lucide="trash-2" style="width:14px"></i></button>
                    </div>
                </div>`;
            });
            el.innerHTML = html || '<div style="padding:1rem; color:var(--text-dim); font-size:0.7rem; text-align:center;">Empty</div>';
            lucide.createIcons();
            if (!isQueue) initSortable();
            else initQueueSortable();
        }

        function initSortable() {
            new Sortable(document.getElementById('playlist-list'), {
                animation: 150, handle: '.lucide-grip-vertical',
                onEnd: (evt) => {
                    const fd = new FormData();
                    fd.append('csrf', csrfToken); fd.append('mount', mount);
                    fd.append('from', evt.oldIndex); fd.append('to', evt.newIndex);
                    fetch('/admin/player/reorder', { method: 'POST', body: fd });
                }
            });
        }

        function initQueueSortable() {
             new Sortable(document.getElementById('queue-list'), {
                animation: 150, handle: '.lucide-grip-vertical',
                onEnd: (evt) => {
                    const fd = new FormData();
                    fd.append('csrf', csrfToken); fd.append('mount', mount);
                    fd.append('action', 'reorder');
                    fd.append('from', evt.oldIndex); fd.append('to', evt.newIndex);
                    fetch('/admin/player/queue', { method: 'POST', body: fd });
                }
            });
        }

        setInterval(() => {
            const prog = document.getElementById('deck-progress');
            const start = parseFloat(prog.dataset.start);
            const dur = parseFloat(prog.dataset.duration);
            if (!start || !dur) return;
            const elapsed = (Date.now() / 1000) - start;
            prog.style.width = Math.min(100, (elapsed / dur) * 100) + '%';
            document.getElementById('deck-time-cur').textContent = formatTime(Math.max(0, Math.min(elapsed, dur)));
            document.getElementById('deck-time-total').textContent = formatTime(dur);
        }, 50);

        function formatTime(s) {
            const m = Math.floor(s / 60); const rs = Math.floor(Math.floor(s) % 60);
            return `${m.toString().padStart(2,'0')}:${rs.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
