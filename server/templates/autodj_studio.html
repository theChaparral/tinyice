<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyIce Studio - {{.Streamer.Name}}</title>
    <script src="/assets/js/lucide.min.js"></script>
    <script src="/assets/js/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1219; --surface-hover: #161b2c;
            --primary: #38bdf8; --primary-glow: rgba(56, 189, 248, 0.3);
            --secondary: #94a3b8; --text: #f8fafc; --text-dim: #64748b;
            --border: #1f222c; --danger: #ef4444; --success: #10b981;
            --warning: #fbbf24;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header */
        header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between; z-index: 100; }
        .studio-logo { display: flex; align-items: center; gap: 0.75rem; font-weight: 800; font-size: 1.1rem; text-decoration: none; color: var(--text); }
        .studio-logo img { height: 24px; }
        .mount-badge { background: var(--primary-glow); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 6px; font-family: monospace; font-size: 0.8rem; font-weight: 700; }
        
        .header-stats { display: flex; gap: 2rem; align-items: center; }
        .h-stat { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-dim); }
        .h-stat strong { color: var(--text); }

        /* Layout Grid */
        .studio-main { flex: 1; display: grid; grid-template-columns: 320px 1fr 350px; gap: 0; overflow: hidden; }
        
        .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); }
        .panel-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
        .panel-header h2 { margin: 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); font-weight: 800; }
        .panel-content { flex: 1; overflow-y: auto; padding: 1rem; }

        /* Library Panel */
        #library-tree { display: flex; flex-direction: column; gap: 0.25rem; }
        .lib-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .lib-item:hover { background: var(--surface-hover); }
        .lib-item i { width: 16px; height: 16px; color: var(--text-dim); }
        .lib-actions { margin-left: auto; display: none; gap: 0.3rem; }
        .lib-item:hover .lib-actions { display: flex; }

        /* Deck Panel (Center) */
        .deck-panel { background: radial-gradient(circle at center, #111827 0%, #05070a 100%); border-right: 1px solid var(--border); }
        .deck-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        
        .vinyl-container { position: relative; width: 350px; height: 350px; margin-bottom: 3rem; }
        .vinyl { width: 100%; height: 100%; border-radius: 50%; background: #111; border: 10px solid #000; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .vinyl::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-radial-gradient(circle, #222 0, #222 1px, transparent 2px, transparent 4px); opacity: 0.3; }
        .vinyl-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: var(--primary); border-radius: 50%; border: 4px solid #000; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .vinyl-label i { color: #000; width: 48px; height: 48px; }
        
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .vinyl-playing .vinyl-label { animation: spin 3s linear infinite; }

        .now-playing-info { text-align: center; max-width: 600px; }
        .song-artist { font-size: 0.9rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        .song-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 2rem; line-height: 1.1; }

        .transport-controls { display: flex; gap: 1.5rem; align-items: center; margin-top: 2rem; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-circle:hover { background: var(--surface-hover); border-color: var(--primary); color: var(--primary); }
        .btn-circle.primary { width: 70px; height: 70px; background: var(--primary); color: #000; border: none; box-shadow: 0 0 30px var(--primary-glow); }
        .btn-circle.primary:hover { transform: scale(1.05); background: #fff; }
        .btn-circle i { width: 20px; height: 20px; }
        .btn-circle.primary i { width: 28px; height: 28px; }

        .deck-toggles { display: flex; gap: 1rem; margin-top: 3rem; }
        .toggle-btn { padding: 0.5rem 1rem; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); font-size: 0.75rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .toggle-btn.active { background: var(--primary-glow); color: var(--primary); border-color: var(--primary); }

        /* Progress Bar */
        .progress-container { width: 100%; max-width: 700px; margin-top: 2rem; }
        .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 15px var(--primary); }
        .progress-times { display: flex; justify-content: space-between; margin-top: 0.75rem; font-family: monospace; font-size: 0.8rem; color: var(--text-dim); }

        /* Right Panel (Playlist/Queue) */
        .playlist-panel { border-right: none; }
        .sub-panel-header { padding: 0.75rem 1rem; background: rgba(0,0,0,0.2); font-size: 0.65rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .p-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; transition: 0.2s; cursor: grab; background: var(--bg); }
        .p-item:hover { background: var(--surface-hover); }
        .p-item.active { background: var(--primary-glow); border-left: 3px solid var(--primary); }
        .p-item .idx { color: var(--text-dim); font-family: monospace; width: 20px; font-size: 0.7rem; }
        .p-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-item .actions { display: none; gap: 0.4rem; }
        .p-item:hover .actions { display: flex; }
        .p-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 2px; }
        .p-btn:hover { color: var(--primary); }
        .p-btn.del:hover { color: var(--danger); }

        /* Utility */
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.7rem; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
        .btn-sm:hover { background: var(--surface-hover); }
        .btn-danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        
        /* Action Overlay (Shared from Admin) */
        .action-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(22, 27, 44, 0.9); backdrop-filter: blur(12px); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; display: none; flex-direction: column; align-items: center; gap: 1rem; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); min-width: 150px; }
        .action-overlay i { width: 48px; height: 48px; }
        .spinner { animation: rotate 2s linear infinite; color: var(--primary); display: inline-block; }
        .success { color: var(--success); }
        .error { color: var(--danger); }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>
    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center;">
            <i data-lucide="loader-2" class="spinner" style="width:48px; height:48px; color:var(--primary);"></i>
            <p style="margin-top:1rem; color:var(--text-dim);">Initializing Studio...</p>
        </div>
    </div>
    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="/admin#tab-streamer" class="studio-logo">
                <i data-lucide="chevron-left" style="width: 20px; color: var(--text-dim);"></i>
                <img src="/assets/logo.png" alt="TinyIce">
                <span>STUDIO</span>
            </a>
            <div class="mount-badge">{{.Streamer.Mount}}</div>
        </div>

        <div class="header-stats">
            <div class="h-stat"><i data-lucide="users" style="width:14px"></i> Listeners: <strong id="h-listeners">0</strong></div>
            <div class="h-stat"><i data-lucide="activity" style="width:14px"></i> Bitrate: <strong id="h-bitrate">0 kbps</strong></div>
            <div class="h-stat"><i data-lucide="clock" style="width:14px"></i> Uptime: <strong id="h-uptime">0s</strong></div>
            <div class="status-pill" id="h-status-pill"><div class="dot"></div> <span id="h-status-text">IDLE</span></div>
        </div>
    </header>

    <div class="studio-main">
        <!-- Left: Library Browser -->
        <div class="panel">
            <div class="panel-header">
                <h2>Library Browser</h2>
                <button class="btn-sm" onclick="refreshLibrary()"><i data-lucide="refresh-cw" style="width:12px"></i></button>
            </div>
            <div class="panel-content" id="library-container">
                <div id="library-tree">
                    <div style="text-align:center; padding: 2rem; color: var(--text-dim); font-size: 0.8rem;">
                        <i data-lucide="loader-2" class="spinner" style="width: 24px; height: 24px; margin-bottom: 1rem;"></i>
                        <br>Loading music directory...
                    </div>
                </div>
            </div>
        </div>

        <!-- Center: The Deck -->
        <div class="panel deck-panel">
            <div class="deck-container">
                <div class="vinyl-container" id="vinyl-box">
                    <div class="vinyl">
                        <div class="vinyl-label">
                            <i data-lucide="music"></i>
                        </div>
                    </div>
                </div>

                <div class="now-playing-info">
                    <div class="song-artist" id="deck-artist">AUTODJ BROADCAST</div>
                    <div class="song-title" id="deck-title">PREPARING DECK...</div>
                </div>

                <div class="progress-container">
                    <div class="progress-track">
                        <div class="progress-bar" id="deck-progress"></div>
                    </div>
                    <div class="progress-times">
                        <span id="deck-time-cur">00:00</span>
                        <span id="deck-time-total">00:00</span>
                    </div>
                </div>

                <div class="transport-controls">
                    <button class="btn-circle" onclick="transport('restart')" title="Restart Song"><i data-lucide="rotate-ccw"></i></button>
                    <button class="btn-circle primary" id="play-pause-btn" onclick="transport('toggle')">
                        <i data-lucide="play" id="play-icon"></i>
                    </button>
                    <button class="btn-circle" onclick="transport('next')" title="Skip to Next"><i data-lucide="skip-forward"></i></button>
                    <button class="btn-circle" style="color: var(--danger)" onclick="transport('stop')" title="Stop Broadcasting"><i data-lucide="square"></i></button>
                </div>

                <div class="deck-toggles">
                    <button class="toggle-btn" id="toggle-shuffle" onclick="transport('shuffle')"><i data-lucide="shuffle"></i> SHUFFLE</button>
                    <button class="toggle-btn" id="toggle-loop" onclick="transport('loop')"><i data-lucide="repeat"></i> LOOP</button>
                    <button class="toggle-btn" id="toggle-meta" onclick="transport('metadata')"><i data-lucide="tag"></i> AUTO-METADATA</button>
                </div>
            </div>
        </div>

        <!-- Right: Management -->
        <div class="panel playlist-panel">
            <div class="panel-header">
                <h2>Management</h2>
            </div>
            
            <div class="sub-panel-header" style="color: var(--primary)">
                UP NEXT (QUEUE)
                <button class="btn-sm btn-danger" onclick="transport('clear-queue')">CLEAR</button>
            </div>
            <div class="list-container" id="queue-list" style="max-height: 30%; border-bottom: 2px solid var(--border);">
                <!-- Populated via SSE -->
            </div>

            <div class="sub-panel-header">
                ACTIVE PLAYLIST
                <div style="display: flex; gap: 0.4rem;">
                    <button class="btn-sm" onclick="transport('save-playlist')">SAVE .PLS</button>
                    <button class="btn-sm btn-danger" onclick="transport('clear-playlist')">CLEAR</button>
                </div>
            </div>
            <div class="list-container" id="playlist-list">
                <!-- Populated via SSE/Initial Load -->
            </div>
        </div>
    </div>

    <div id="action-overlay" class="action-overlay">
        <div id="action-icon-container">
            <i data-lucide="loader-2" class="spinner"></i>
        </div>
        <div id="action-text" style="font-size: 0.9rem; font-weight: 600; color: var(--text-dim);">Processing...</div>
    </div>

    <script>
        const mount = "{{.Streamer.Mount}}";
        const csrfToken = "{{.CSRFToken}}";
        let lastStartTime = 0;

        // Hide loading overlay on init
        window.addEventListener('load', () => {
            document.getElementById('loading-overlay').style.display = 'none';
        });

        // --- Core Studio Logic ---

        function transport(action) {
            const formData = new FormData();
            formData.append('csrf', csrfToken);
            formData.append('mount', mount);
            
            let url = `/admin/player/${action}`;
            if (action === 'toggle') url = '/admin/player/toggle';
            if (action === 'clear-playlist') url = '/admin/player/clear-playlist';
            if (action === 'save-playlist') url = '/admin/player/save-playlist';
            
            submitForm(url, formData);
        }

        function playlistAction(action, fileOrIdx) {
            const formData = new FormData();
            formData.append('csrf', csrfToken);
            formData.append('mount', mount);
            formData.append('action', action);
            if (action === 'add') formData.append('file', fileOrIdx);
            else formData.append('index', fileOrIdx);

            submitForm('/admin/player/playlist-action', formData);
        }

        function queueAction(action, pathOrIdx) {
            const formData = new FormData();
            formData.append('csrf', csrfToken);
            formData.append('mount', mount);
            formData.append('action', action);
            if (action === 'add') formData.append('path', pathOrIdx);
            else formData.append('index', pathOrIdx);

            submitForm('/admin/player/queue', formData);
        }

        function submitForm(url, formData) {
            const overlay = document.getElementById('action-overlay');
            const text = document.getElementById('action-text');
            const icon = document.getElementById('action-icon-container');
            
            overlay.style.display = 'flex';
            icon.innerHTML = '<i data-lucide="loader-2" class="spinner"></i>';
            text.textContent = 'Updating...';
            lucide.createIcons();

            fetch(url, { method: 'POST', body: formData })
                .then(r => {
                    if (r.ok) {
                        icon.innerHTML = '<i data-lucide="check-circle-2" class="success"></i>';
                        text.textContent = 'Success';
                        lucide.createIcons();
                        setTimeout(() => overlay.style.display = 'none', 600);
                    } else {
                        r.text().then(txt => alert('Action failed: ' + txt));
                        overlay.style.display = 'none';
                    }
                });
        }

        // --- Library Browser ---
        function loadLibrary(subPath = '') {
            const container = document.getElementById('library-tree');
            fetch(`/admin/player/files?mount=${encodeURIComponent(mount)}&path=${encodeURIComponent(subPath)}`)
                .then(r => r.json())
                .then(entries => {
                    let html = '';
                    if (subPath !== '') {
                        html += `<div class="lib-item" onclick="loadLibrary('${subPath.split('/').slice(0,-1).join('/')}')"><i data-lucide="chevron-left"></i> ..</div>`;
                    }
                    entries.forEach(e => {
                        const icon = e.is_dir ? 'folder' : (e.is_pls ? 'file-audio' : 'music');
                        html += `
                        <div class="lib-item">
                            <div style="display:flex; align-items:center; gap:0.6rem; flex:1; overflow:hidden;" ${e.is_dir ? `onclick="loadLibrary('${e.path}')"` : ''}>
                                <i data-lucide="${icon}"></i>
                                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${e.title || e.name}</span>
                            </div>
                            <div class="lib-actions">
                                ${(!e.is_dir && !e.is_pls) ? `<button class="btn-sm" onclick="queueAction('add', '${e.abs_path}')">QUEUE</button>` : ''}
                                <button class="btn-sm" onclick="${e.is_pls ? `transport('load-playlist&file=${encodeURIComponent(e.abs_path)}')` : `playlistAction('add', '${e.abs_path}')`}" title="Add to active playlist">ADD</button>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                    lucide.createIcons();
                });
        }

        // --- SSE State Sync ---
        const es = new EventSource("/admin/events");
        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const st = data.streamers.find(s => s.mount === mount);
            if (!st) return;

            // Header Stats
            document.getElementById('h-listeners').textContent = data.total_listeners;
            document.getElementById('h-bitrate').textContent = st.bitrate ? `${st.bitrate} kbps` : 'N/A';
            document.getElementById('h-uptime').textContent = data.server_uptime;
            
            const pill = document.getElementById('h-status-pill');
            const pillText = document.getElementById('h-status-text');
            const vinyl = document.getElementById('vinyl-box');
            const playIcon = document.getElementById('play-icon');

            if (st.state === 1) {
                pill.classList.remove('inactive');
                pillText.textContent = 'LIVE';
                vinyl.classList.add('vinyl-playing');
                playIcon.setAttribute('data-lucide', 'pause');
                document.getElementById('deck-title').textContent = st.song || 'Live Broadcast';
                
                // Progress Update
                const prog = document.getElementById('deck-progress');
                if (lastStartTime !== st.start_time) {
                    prog.style.width = '0%';
                    lastStartTime = st.start_time;
                }
                prog.dataset.start = st.start_time;
                prog.dataset.duration = st.duration;
            } else {
                pill.classList.add('inactive');
                pillText.textContent = 'IDLE';
                vinyl.classList.remove('vinyl-playing');
                playIcon.setAttribute('data-lucide', 'play');
                document.getElementById('deck-title').textContent = 'DECK IDLE';
            }
            lucide.createIcons();

            // Toggles
            document.getElementById('toggle-shuffle').classList.toggle('active', st.shuffle);
            document.getElementById('toggle-loop').classList.toggle('active', st.loop);
            
            // Queue
            const qList = document.getElementById('queue-list');
            let qHtml = '';
            (st.queue || []).forEach((q, idx) => {
                qHtml += `<div class="p-item"><span class="idx">${idx+1}</span><span class="title">${q.Title}</span><button class="p-btn del" onclick="queueAction('remove', ${idx})"><i data-lucide="x" style="width:14px"></i></button></div>`;
            });
            qList.innerHTML = qHtml || '<div style="padding:1rem; color:var(--text-dim); font-size:0.7rem; text-align:center;">Queue is empty</div>';

            // Playlist (Only refresh if length changed or we haven't loaded it)
            const pList = document.getElementById('playlist-list');
            if (pList.dataset.len != st.playlist_len) {
                refreshPlaylist();
                pList.dataset.len = st.playlist_len;
            }
        };

        function refreshPlaylist() {
            // We fetch the full playlist info since SSE only sends length for bandwidth
            fetch(`/admin/player/playlist-info?mount=${encodeURIComponent(mount)}`)
                .then(r => r.json())
                .then(items => {
                    const pList = document.getElementById('playlist-list');
                    let html = '';
                    items.forEach((item, idx) => {
                        html += `
                        <div class="p-item" data-index="${idx}">
                            <i data-lucide="grip-vertical" style="width:12px; color:var(--border)"></i>
                            <span class="idx">${idx+1}</span>
                            <span class="title">${item.Title}</span>
                            <div class="actions">
                                <button class="p-btn" onclick="queueAction('add', '${item.Path}')" title="Queue Next"><i data-lucide="list-plus" style="width:14px"></i></button>
                                <button class="p-btn del" onclick="playlistAction('remove', ${idx})"><i data-lucide="trash-2" style="width:14px"></i></button>
                            </div>
                        </div>`;
                    });
                    pList.innerHTML = html;
                    lucide.createIcons();
                    initSortable();
                });
        }

        function initSortable() {
            new Sortable(document.getElementById('playlist-list'), {
                animation: 150,
                handle: '.lucide-grip-vertical',
                onEnd: (evt) => {
                    const formData = new FormData();
                    formData.append('csrf', csrfToken);
                    formData.append('mount', mount);
                    formData.append('from', evt.oldIndex);
                    formData.append('to', evt.newIndex);
                    fetch('/admin/player/reorder', { method: 'POST', body: formData });
                }
            });
        }

        function updateProgress() {
            const bar = document.getElementById('deck-progress');
            const start = parseFloat(bar.dataset.start);
            const duration = parseFloat(bar.dataset.duration);
            if (!start || !duration) return;

            const elapsed = (Date.now() / 1000) - start;
            const progress = Math.min(100, (elapsed / duration) * 100);
            bar.style.width = progress + '%';

            const cur = Math.max(0, Math.min(elapsed, duration));
            document.getElementById('deck-time-cur').textContent = formatTime(cur);
            document.getElementById('deck-time-total').textContent = formatTime(duration);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const rs = Math.floor(s % 60);
            return `${m.toString().padStart(2,'0')}:${rs.toString().padStart(2,'0')}`;
        }

        setInterval(updateProgress, 50);
        
        // Initial Load
        loadLibrary();
        lucide.createIcons();
    </script>
</body>
</html>
